<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student - ระบบจัดการชีวิตนักศึกษา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.1);
            animation: float 15s infinite;
            bottom: -150px;
            border-radius: 50%;
        }
        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 60px; height: 60px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 40px; height: 40px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 30px; height: 30px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-animation span:nth-child(7) { left: 35%; width: 50px; height: 50px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 90px; height: 90px; animation-delay: 0s; animation-duration: 11s; }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Landing */
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            color: white;
        }
        .logo-container { margin-bottom: 2rem; animation: bounceIn 1s ease-out; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .logo-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: slideDown 0.8s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .subtitle {
            font-size: 1.3rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: slideUp 0.8s ease-out 0.2s both;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Features */
        .features {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 1s ease-out 0.4s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .feature-item:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .feature-item i { font-size: 2rem; }
        .feature-item span { font-size: 0.9rem; }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 1rem;
            animation: slideUp 0.8s ease-out 0.6s both;
        }
        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: white;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-container {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 450px;
            position: relative;
            transform: scale(0.8) translateY(50px);
            transition: all 0.4s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 40px; height: 40px;
            border: none;
            background: #f3f4f6;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .modal-close:hover {
            background: #e5e7eb;
            transform: rotate(90deg);
        }
        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .modal-header h2 {
            color: #1f2937;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .modal-header p {
            color: #6b7280;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Kanit', sans-serif;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
        }
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .features { gap: 1rem; }
            .feature-item { min-width: 100px; padding: 0.75rem; }
            .buttons { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="landing-container">
        <div class="logo-container">
            <i class="fas fa-graduation-cap logo-icon"></i>
        </div>
        <h1 class="title">Smart Student Life Manager</h1>
        <p class="subtitle">ระบบจัดการชีวิตนักศึกษาอัจฉริยะ</p>
        
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-calendar-alt"></i>
                <span>ตารางเรียน</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-tasks"></i>
                <span>งาน & โปรเจค</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-wallet"></i>
                <span>ค่าใช้จ่าย</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-brain"></i>
                <span>AI ผู้ช่วย</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="openModal('login')">
                <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
            </button>
            <button class="btn btn-secondary" onclick="openModal('register')">
                <i class="fas fa-user-plus"></i> สมัครสมาชิก
            </button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal('login')">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2>เข้าสู่ระบบ</h2>
                <p>ยินดีต้อนรับกลับมา!</p>
            </div>
            <div class="error-message" id="loginError"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>อีเมล</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn">เข้าสู่ระบบ</button>
            </form>
            <div class="form-footer">
                ยังไม่มีบัญชี? <a onclick="switchModal('register')">สมัครสมาชิก</a>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal('register')">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2>สมัครสมาชิก</h2>
                <p>เริ่มต้นการจัดการชีวิตนักศึกษา</p>
            </div>
            <div class="error-message" id="registerError"></div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>รหัสนักศึกษา</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" class="form-control" id="regStudentId" placeholder="631xxxxxx" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="regFullName" placeholder="ชื่อ นามสกุล" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>อีเมล</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="regPassword" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label>คณะ</label>
                    <div class="input-wrapper">
                        <i class="fas fa-university"></i>
                        <input type="text" class="form-control" id="regFaculty" placeholder="เช่น วิทยาศาสตร์">
                    </div>
                </div>
                <div class="form-group">
                    <label>สาขา</label>
                    <div class="input-wrapper">
                        <i class="fas fa-book"></i>
                        <input type="text" class="form-control" id="regMajor" placeholder="เช่น วิทยาการคอมพิวเตอร์">
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="registerBtn">สมัครสมาชิก</button>
            </form>
            <div class="form-footer">
                มีบัญชีแล้ว? <a onclick="switchModal('login')">เข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';

        function openModal(type) {
            document.getElementById(type + 'Modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(type) {
            document.getElementById(type + 'Modal').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById(type + 'Error').classList.remove('show');
        }

        function switchModal(type) {
            closeModal(type === 'login' ? 'register' : 'login');
            setTimeout(() => openModal(type), 300);
        }

        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            
            btn.disabled = true;
            btn.innerHTML = 'กำลังเข้าสู่ระบบ...<span class="loading-spinner"></span>';
            errorDiv.classList.remove('show');

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    btn.innerHTML = '<i class="fas fa-check"></i> เข้าสู่ระบบสำเร็จ!';
                    btn.style.background = '#10b981';
                    setTimeout(() => window.location.href = '/app.html', 1000);
                } else {
                    throw new Error(data.error || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('registerError');
            
            btn.disabled = true;
            btn.innerHTML = 'กำลังสมัคร...<span class="loading-spinner"></span>';
            errorDiv.classList.remove('show');

            const userData = {
                student_id: document.getElementById('regStudentId').value,
                full_name: document.getElementById('regFullName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                faculty: document.getElementById('regFaculty').value,
                major: document.getElementById('regMajor').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    btn.innerHTML = '<i class="fas fa-check"></i> สมัครสำเร็จ!';
                    btn.style.background = '#10b981';
                    setTimeout(() => window.location.href = '/app.html', 1000);
                } else {
                    throw new Error(data.error || 'ไม่สามารถสมัครได้');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'สมัครสมาชิก';
            }
        }

        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`${API_URL}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(response => {
                if (response.ok) {
                    window.location.href = '/app.html';
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            });
        }
    </script>
</body>
</html>
